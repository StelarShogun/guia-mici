<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyLab - iniciar backend</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #eef3f6;
      color: #1d2730;
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 24px;
    }
    main {
      max-width: 760px;
      background: #fff;
      border: 1px solid #d9e4e9;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 16px 34px rgba(16, 47, 73, .10);
    }
    h1 { color: #102f49; margin-top: 0; }
    code {
      display: block;
      background: #102f49;
      color: #fff;
      padding: 14px;
      border-radius: 8px;
      overflow-x: auto;
    }
    a {
      display: inline-flex;
      margin-top: 16px;
      background: #1f7656;
      color: #fff;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <h1>StudyLab ahora usa backend</h1>
    <p>Esta versión es una plataforma reutilizable con FastAPI, SQLite, panel admin, simulador, gráficas dinámicas y progreso local.</p>
    <p>Para abrirla, ejecuta en esta carpeta:</p>
    <code>./run.sh</code>
    <p>Luego entra a:</p>
    <a href="http://127.0.0.1:8000/">http://127.0.0.1:8000/</a>
  </main>
</body>
</html>
